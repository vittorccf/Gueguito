<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio 2026 — José Guilherme Alves</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0e0e0f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #f2f2f0;
    }

    .pages {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 24px 16px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .pages img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <main class="pages">
    <img src="pdf/preview/page-01.png" alt="Página 1">
    <img src="pdf/preview/page-02.png" alt="Página 2">
    <img src="pdf/preview/page-03.png" alt="Página 3">
    <img src="pdf/preview/page-04.png" alt="Página 4">
    <img src="pdf/preview/page-05.png" alt="Página 5">
    <img src="pdf/preview/page-06.png" alt="Página 6">
    <img src="pdf/preview/page-07.png" alt="Página 7">
    <img src="pdf/preview/page-08.png" alt="Página 8">
    <img src="pdf/preview/page-09.png" alt="Página 9">
    <img src="pdf/preview/page-10.png" alt="Página 10">
    <img src="pdf/preview/page-11.png" alt="Página 11">
    <img src="pdf/preview/page-12.png" alt="Página 12">
    <img src="pdf/preview/page-13.png" alt="Página 13">
    <img src="pdf/preview/page-14.png" alt="Página 14">
  </main>
</body>
</html>
